<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0f1020">
  <title>Curio — knowledge, free forever</title>
  <meta name="description" content="Daily general-knowledge challenges, quick-fire quizzes and streaks. Free forever. Make being a nerd sexy again.">
  <link rel="stylesheet" href="styles.css">
  <!-- PWA -->
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icons/favicon-32.png" sizes="32x32">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Curio">
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div class="logo"><span class="mark">🦉</span><span class="name">Curio</span></div>
      <button class="installbtn hidden" id="installBtn">⬇ Install</button>
      <div class="tag">knowledge · free · forever</div>
    </div>
    <div id="app"></div>
  </div>

  <!-- iOS "add to home screen" hint (Safari has no install prompt) -->
  <div class="iosbanner hidden" id="iosBanner">
    <span>Install Curio: tap <b>Share</b> <span style="font-size:16px">􀈂</span> then <b>Add to Home Screen</b>.</span>
    <button id="iosClose" aria-label="Dismiss">✕</button>
  </div>

  <script src="questions.js"></script>
  <script src="app.js"></script>
  <script>
    // --- Service worker (offline) ---
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", function () {
        navigator.serviceWorker.register("sw.js").catch(function () {});
      });
    }
    // --- Install prompt (Android/Chrome/Edge) ---
    var deferred = null, installBtn = document.getElementById("installBtn");
    window.addEventListener("beforeinstallprompt", function (e) {
      e.preventDefault(); deferred = e; installBtn.classList.remove("hidden");
    });
    installBtn.addEventListener("click", function () {
      if (!deferred) return;
      deferred.prompt();
      deferred.userChoice.finally(function () { deferred = null; installBtn.classList.add("hidden"); });
    });
    window.addEventListener("appinstalled", function () { installBtn.classList.add("hidden"); });
    // --- iOS Safari hint (only if not already installed & not dismissed) ---
    (function () {
      var ua = navigator.userAgent || "";
      var isIOS = /iphone|ipad|ipod/i.test(ua) && !window.MSStream;
      var isSafari = /^((?!chrome|crios|fxios|edgios).)*safari/i.test(ua);
      var standalone = window.navigator.standalone === true ||
        (window.matchMedia && window.matchMedia("(display-mode: standalone)").matches);
      var dismissed = localStorage.getItem("curio.iosHintDismissed") === "1";
      if (isIOS && isSafari && !standalone && !dismissed) {
        var b = document.getElementById("iosBanner");
        b.classList.remove("hidden");
        document.getElementById("iosClose").addEventListener("click", function () {
          b.classList.add("hidden"); localStorage.setItem("curio.iosHintDismissed", "1");
        });
      }
    })();
  </script>
</body>
</html>
